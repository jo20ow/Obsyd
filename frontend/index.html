<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply the saved theme (default light) before paint to avoid a flash. -->
    <script>
      try { if (localStorage.getItem('obsyd-theme') !== 'dark') document.documentElement.classList.add('light') } catch (e) {}
    </script>
    <meta name="description" content="OBSYD — the European electricity desk, a free 'gridstatus for Europe'. Day-ahead prices, load &amp; residual load, generation mix, wind/solar and cross-border flows for DE-LU, FR &amp; NL — plus forecasts, the gas that fuels the marginal price, and a live anomaly radar. From the official record (ENTSO-E, Energy-Charts, GIE). Descriptive, auditable, free." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f6f7f9" />
    <link rel="canonical" href="https://obsyd.dev/" />
    <link rel="alternate" type="application/rss+xml" title="OBSYD Anomaly Radar" href="https://obsyd.dev/api/alerts/rss" />
    <title>OBSYD — The European Electricity Desk</title>

    <!-- Open Graph / Twitter — link previews on Slack/Discord/LinkedIn/X. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OBSYD" />
    <meta property="og:title" content="OBSYD — The European Electricity Desk" />
    <meta property="og:description" content="A free 'gridstatus for Europe': day-ahead prices, load &amp; residual load, generation mix, wind/solar and cross-border flows for DE-LU, FR &amp; NL — plus forecasts and a live anomaly radar. Descriptive, auditable, free." />
    <meta property="og:url" content="https://obsyd.dev/" />
    <meta property="og:image" content="https://obsyd.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OBSYD — The European Electricity Desk" />
    <meta name="twitter:description" content="A free gridstatus for Europe — day-ahead prices, load, generation mix, cross-border flows &amp; forecasts for DE-LU/FR/NL, with a live anomaly radar. Free &amp; open source." />
    <meta name="twitter:image" content="https://obsyd.dev/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OBSYD",
        "url": "https://obsyd.dev/",
        "description": "The European electricity desk — a free gridstatus for Europe. Day-ahead prices, load, generation mix, cross-border flows and forecasts for DE-LU/FR/NL, with a live anomaly radar. From the official record, descriptive and auditable."
      }
    </script>

    <!--
      Plausible Analytics — privacy-friendly, no cookies, GDPR-ready.
      No-op until you add obsyd.dev to a Plausible account
      (https://plausible.io — Free for OSS projects via their plan, or self-hosted).
      If you don't want analytics at all, just delete the script tag.
    -->
    <script defer data-domain="obsyd.dev" src="https://plausible.io/js/script.outbound-links.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
