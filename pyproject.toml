[tool.bandit]
exclude_dirs = [".venv", "frontend", "node_modules"]
skips = ["B101"]  # assert used in tests

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# conftest deliberately sets os.environ before importing backend modules
# so pydantic_settings picks up test values — imports cannot move to the top.
"backend/tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
# Run `async def` tests without per-test markers (gas ingestion is async).
# Only affects coroutine tests; existing sync tests are unchanged.
asyncio_mode = "auto"
